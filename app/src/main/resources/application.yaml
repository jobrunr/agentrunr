spring:
  application:
    name: JavaClaw
  autoconfigure:
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkChatAutoConfiguration
  config:
    import: optional:classpath:application.private.yaml
  datasource:
    url: jdbc:h2:file:./workspace/app
  ai:
    model:
      audio.speech: unknown
      audio.transcription: unknown
      embedding: unknown
      image: unknown
      moderation: unknown

management:
  endpoint:
    restart:
      enabled: true

pebble:
  suffix: .html.peb

agent:
  onboarding:
    completed: false
  workspace: file:./workspace/
jobrunr:
  background-job-server:
    enabled: true
    worker-count: 1
  dashboard:
    enabled: true
    port: 8081
